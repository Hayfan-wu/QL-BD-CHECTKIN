<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 380px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f6fa;
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            padding: 18px 20px;
            text-align: center;
        }
        .header h1 { font-size: 18px; margin-bottom: 4px; }
        .header p { font-size: 12px; opacity: 0.85; }
        .content { padding: 20px; }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-copy {
            background: #28a745;
            color: #fff;
        }
        .btn-copy:hover { background: #218838; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .result-area {
            display: none;
            background: #1a1a2e;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .result-label {
            color: #888;
            font-size: 11px;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-value {
            color: #00ff88;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            max-height: 60px;
            overflow-y: auto;
            padding: 4px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
        }
        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            display: none;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        .footer {
            text-align: center;
            font-size: 11px;
            color: #aaa;
            padding-top: 8px;
            border-top: 1px solid #eee;
        }
        .qr-hint {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔑 BDUSS 提取工具</h1>
        <p>百度网盘 Cookie 自动获取</p>
    </div>
    <div class="content">
        <div id="alertBox" class="alert"></div>

        <div id="resultArea" class="result-area">
            <div class="result-label">BDUSS</div>
            <div id="bdussValue" class="result-value"></div>
        </div>

        <div id="stokenArea" class="result-area">
            <div class="result-label">STOKEN</div>
            <div id="stokenValue" class="result-value"></div>
        </div>

        <button id="extractBtn" class="btn btn-primary" onclick="extractBDUSS()">
            🔍 一键提取 BDUSS
        </button>

        <button id="copyBtn" class="btn btn-copy" style="display:none;" onclick="copyBDUSS()">
            📋 复制 BDUSS
        </button>

        <div class="qr-hint">
            请确保浏览器已登录百度网盘
        </div>

        <div class="footer">
            插件通过 cookies API 直接读取，支持 HttpOnly Cookie
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
